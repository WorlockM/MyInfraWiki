name: Retag Docker Image

on:
  workflow_dispatch:
    inputs:
      old_tag:
        description: 'Existing tag to copy from'
        required: true
      new_tag:
        description: 'New tag to create'
        required: true

jobs:
  retag:
    name: Copy image tag
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Copy tag
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          crane copy \
            ghcr.io/${REPO}:${{ inputs.old_tag }} \
            ghcr.io/${REPO}:${{ inputs.new_tag }}

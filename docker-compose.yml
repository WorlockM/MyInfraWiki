services:
  app:
    image: ghcr.io/worlockm/myinfrawiki:dev
    pull_policy: always
    ports:
      - "3000:3000"
    volumes:
      - wiki-data:/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/wiki.db
      - UPLOADS_PATH=/data/uploads
      - PORT=3000

volumes:
  wiki-data:
